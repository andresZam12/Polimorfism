# ================================================
# Aplicación
# ================================================
spring.application.name=notificaciones-universidad
server.port=8080

# ================================================
# Perfil activo (dev = PostgreSQL | h2 = memoria)
# Cambia a 'h2' si quieres probar sin tener PostgreSQL instalado
# ================================================
spring.profiles.active=dev

# ================================================
# Base de datos — PostgreSQL (perfil dev, default)
# Cambia estos valores por los de tu instalación local.
# Alternativamente, puedes sobrescribirlos con variables de entorno
# (DB_URL, DB_USER, DB_PASSWORD) sin editar este archivo.
# ================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/notificaciones_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================================
# JPA / Hibernate
# ================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================================
# Swagger / OpenAPI
# ================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================================
# Logging
# ================================================
logging.level.root=INFO
logging.level.edu.universidad.notificaciones=DEBUG
